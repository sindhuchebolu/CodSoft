<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Neon Calculator</title>

    <link rel="stylesheet" href="design.css">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Background Glow -->
    <div class="bg-circle one"></div>
    <div class="bg-circle two"></div>

    <!-- Calculator -->
    <div class="calculator">

        <!-- Display -->
        <div class="screen" id="screen">
            0
        </div>

        <!-- Buttons -->
        <div class="buttons">

            <!-- Row 1 -->
            <button class="btn operator" value="/">÷</button>
            <button class="btn operator" value="*">×</button>
            <button class="btn operator" value="-">−</button>
            <button class="btn operator plus" value="+">+</button>

            <!-- Row 2 -->
            <button class="btn" value="7">7</button>
            <button class="btn" value="8">8</button>
            <button class="btn" value="9">9</button>
            <button class="btn operator" value="%">%</button>

            <!-- Row 3 -->
            <button class="btn" value="4">4</button>
            <button class="btn" value="5">5</button>
            <button class="btn" value="6">6</button>
            <button class="btn operator" value="+">+</button>

            <!-- Row 4 -->
            <button class="btn" value="1">1</button>
            <button class="btn" value="2">2</button>
            <button class="btn" value="3">3</button>

            <button class="btn equal" value="=" rowspan="2">
                =
            </button>

            <!-- Row 5 -->
            <button class="btn" value="0">0</button>
            <button class="btn" value=".">.</button>

            <button class="btn clear" value="AC">
                AC
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
